name: SimpMusic Arch Pro Builder
on:
  workflow_dispatch:

jobs:
  build_arch:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PROJECT_NAME: "SimpMusic"
    
    steps:
      - name: 🚀 Start & Notify Telegram
        id: init_step
        run: |
          START_TIME=$(date +%s)
          USER="${{ github.actor }}"
          RUN_ID="${{ github.run_id }}"
          
          # Escaping dots and dashes for MarkdownV2 stability
          MSG="📦 *Project:* \`$PROJECT_NAME\`%0A🚀 *Build Triggered* \(branch: \`main\`\)%0A──────────────────%0A👤 *User:* \`$USER\`%0A🆔 *Build ID:* \`$RUN_ID\`%0A📊 *Status:* \[░░░░░░░░░░░░░░░░░░░░\] 0%25"
          
          # Capture clean Message ID using jq -r
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID&text=$MSG&parse_mode=MarkdownV2")
          
          MSG_ID=$(echo $RESPONSE | jq -r '.result.message_id')
          
          if [ "$MSG_ID" == "null" ] || [ -z "$MSG_ID" ]; then
            echo "Error: Telegram API rejected the message."
            exit 1
          fi

          echo "START_TIME=$START_TIME" >> $GITHUB_ENV
          echo "MSG_ID=$MSG_ID" >> $GITHUB_ENV

      - name: 🏗️ Arch Linux Build
        run: |
          MSG="📦 *Project:* \`$PROJECT_NAME\`%0A🚀 *Build Running*%0A──────────────────%0A📊 *Status:* \[▓▓▓▓▓▓▓▓▓▓░░░░░░░░░░\] 50%25%0A⚙️ *Stage:* Compiling \(Java 21 \+ Full Build\)\.\.\."
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"

          # Use official Arch Linux Docker container
          docker run --rm -v $PWD:/workspace -w /workspace archlinux:latest /bin/bash -c "
            # 1. Install Java 21 and build dependencies
            pacman -Syu --noconfirm base-devel git jdk21-openjdk gstreamer glu hicolor-icon-theme
            useradd -m builder && chown -R builder /workspace
            
            cat <<EOF > PKGBUILD
            pkgname=simpmusic-git
            pkgver=\$(date +%Y%m%d)
            pkgrel=1
            arch=('x86_64')
            depends=('java-runtime>=21' 'gstreamer' 'glu')
            # Pulling specifically from the main branch
            source=('SimpMusic::git+https://github.com/maxrave-dev/SimpMusic.git#branch=main')
            md5sums=('SKIP')

            build() {
              # PRO FIX: We use a relative path to the cloned folder 
              # to avoid any absolute path variable bugs inside Docker.
              cd \"\$srcdir/SimpMusic\" || cd SimpMusic
              
              # Enable 'isFullBuild' to match official Red Hat workflow
              echo \"isFullBuild=true\" >> gradle.properties
              
              chmod +x gradlew
              ./gradlew :composeApp:packageReleaseDistributionForCurrentOS
            }

            package() {
              cd \"\$srcdir/SimpMusic\" || cd SimpMusic
              # Search for the executable binary in the build binaries output
              BINARY_PATH=\$(find . -type f -executable -name \"SimpMusic\" | grep \"binaries\" | head -n 1)
              
              if [ -z \"\$BINARY_PATH\" ]; then 
                echo \"Binary not found\!\"
                exit 1
              fi
              
              install -Dm755 \"\$BINARY_PATH\" \"\$pkgdir/usr/bin/simpmusic\"
            }
          EOF
            
            # Build the package as the non-root 'builder' user
            su builder -c 'makepkg -fc --noconfirm'
          " 2>&1 | tee build_log.txt
          
          # Verify the .zst package exists before continuing
          if [[ ! -f $(ls *.pkg.tar.zst | head -n 1) ]]; then
            echo "Build failed to produce Arch package. Check build_log.txt"
            exit 1
          fi

      - name: ✅ Success & Delivery
        if: success()
        run: |
          END_TIME=$(date +%s)
          DURATION=$(( (END_TIME - START_TIME) / 60 ))
          SEC_REM=$(( (END_TIME - START_TIME) % 60 ))
          
          MSG="📦 *Project:* \`$PROJECT_NAME\`%0A✅ *Build Finished\!*%0A──────────────────%0A⏱️ *Time:* \`${DURATION}m ${SEC_REM}s\`%0A📊 *Status:* \[▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓\] 100%25"
          
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"
          
          # Find and upload the .zst file
          ZST_FILE=$(ls *.pkg.tar.zst | head -n 1)
          curl -F "chat_id=$CHAT_ID" -F document=@"$ZST_FILE" \
               -F caption="📦 *Artifact: $PROJECT_NAME (Arch)*%0A⏱️ Duration: \`${DURATION}m ${SEC_REM}s\`%0AInstall: \`sudo pacman -U $ZST_FILE\`" \
               -F "parse_mode=MarkdownV2" \
               "https://api.telegram.org/bot$TOKEN/sendDocument"

      - name: ❌ Failure Handling
        if: failure()
        run: |
          MSG="📦 *Project:* \`$PROJECT_NAME\`%0A🚨 *Build FAILED*%0A──────────────────%0A❌ *Result:* Compilation error occurred\. Logs attached below\."
          
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"
          
          if [ -f build_log.txt ]; then
            curl -F "chat_id=$CHAT_ID" -F document=@"build_log.txt" \
                 -F caption="📄 *Error Log: $PROJECT_NAME*" \
                 -F "parse_mode=MarkdownV2" \
                 "https://api.telegram.org/bot$TOKEN/sendDocument"
          fi