name: SimpMusic Arch Pro Builder
on:
  workflow_dispatch:

jobs:
  build_arch:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PROJECT_NAME: "SimpMusic"
    
    steps:
      - name: рџљЂ Start & Notify Telegram
        id: init_step
        run: |
          START_TIME=$(date +%s)
          USER="${{ github.actor }}"
          RUN_ID="${{ github.run_id }}"
          
          # Initial Telegram Message
          MSG="рџ“¦ *Project:* \`$PROJECT_NAME\`%0Aрџ†” *Build ID:* \`$RUN_ID\`%0AрџљЂ *Status:* \[в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘\] 0%25%0Aвљ™пёЏ *Stage:* Preparing Arch Container\.\.\."
          
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID&text=$MSG&parse_mode=MarkdownV2")
          
          MSG_ID=$(echo $RESPONSE | jq -r '.result.message_id')
          
          # Save to Env for subsequent steps
          echo "START_TIME=$START_TIME" >> $GITHUB_ENV
          echo "MSG_ID=$MSG_ID" >> $GITHUB_ENV
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: рџЏ—пёЏ Arch Linux Build
        run: |
          MSG="рџ“¦ *Project:* \`$PROJECT_NAME\`%0Aрџ†” *Build ID:* \`$RUN_ID\`%0Aрџ“Љ *Status:* \[в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘\] 50%25%0Aвљ™пёЏ *Stage:* Exporting Libs \+ Compiling\.\.\."
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"

          # Use official Arch Linux Docker container
          docker run --rm -v $PWD:/workspace -w /workspace archlinux:latest /bin/bash -c "
            # 1. Install Java 21 + UI Dependencies
            pacman -Syu --noconfirm base-devel git jdk21-openjdk gstreamer glu hicolor-icon-theme libxtst libx11
            useradd -m builder && chown -R builder /workspace
            
            cat <<EOF > PKGBUILD
            pkgname=simpmusic-git
            pkgver=\$(date +%Y%m%d)
            pkgrel=1
            arch=('x86_64')
            depends=('java-runtime>=21' 'gstreamer' 'glu' 'libxtst' 'libx11')
            source=('SimpMusic::git+https://github.com/maxrave-dev/SimpMusic.git#branch=main')
            md5sums=('SKIP')

            build() {
              cd \"\$srcdir/SimpMusic\"
              # Match developer's original build flavor
              echo \"isFullBuild=true\" >> gradle.properties
              chmod +x gradlew
              # Exporting library definitions is required for this repo
              ./gradlew exportLibraryDefinitions
              ./gradlew :composeApp:packageReleaseDistributionForCurrentOS
            }

            package() {
              cd \"\$srcdir/SimpMusic\"
              # Dynamic search for the executable
              BINARY_PATH=\$(find . -type f -executable -name \"SimpMusic\" | grep \"binaries\" | head -n 1)
              if [ -z \"\$BINARY_PATH\" ]; then exit 1; fi
              install -Dm755 \"\$BINARY_PATH\" \"\$pkgdir/usr/bin/simpmusic\"
            }
          EOF
            
            su builder -c 'makepkg -fc --noconfirm'
          " 2>&1 | tee build_log.txt
          
          # Verification check
          if [[ ! -f $(ls *.pkg.tar.zst | head -n 1) ]]; then
            echo "Error: No package generated. Check the build_log.txt"
            exit 1
          fi

      - name: рџ”ђ Generate MD5
        if: success()
        run: |
          ZST_FILE=$(ls *.pkg.tar.zst | head -n 1)
          MD5_SUM=$(md5sum "$ZST_FILE" | awk '{ print $1 }')
          echo "MD5_SUM=$MD5_SUM" >> $GITHUB_ENV

      - name: вњ… Success & Delivery
        if: success()
        run: |
          END_TIME=$(date +%s)
          DURATION=$(( (END_TIME - START_TIME) / 60 ))
          SEC_REM=$(( (END_TIME - START_TIME) % 60 ))
          
          MSG="рџ“¦ *Project:* \`$PROJECT_NAME\`%0Aрџ†” *Build ID:* \`$RUN_ID\`%0Aвњ… *Build Finished\!*%0AвЏ±пёЏ *Time:* \`${DURATION}m ${SEC_REM}s\`%0Aрџ“Љ *Status:* \[в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“\] 100%25"
          
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"
          
          ZST_FILE=$(ls *.pkg.tar.zst | head -n 1)
          curl -F "chat_id=$CHAT_ID" -F document=@"$ZST_FILE" \
               -F caption="рџ“¦ *Artifact: $PROJECT_NAME*%0Aрџ†” *Build:* \`$RUN_ID\`%0Aрџ”‘ *MD5:* \`$MD5_SUM\`%0AInstall: \`sudo pacman -U $ZST_FILE\`" \
               -F "parse_mode=MarkdownV2" \
               "https://api.telegram.org/bot$TOKEN/sendDocument"

      - name: вќЊ Failure Notification
        if: failure()
        run: |
          MSG="рџ“¦ *Project:* \`$PROJECT_NAME\`%0Aрџ†” *Build ID:* \`$RUN_ID\`%0AрџљЁ *FAILED\!*%0AвќЊ *Action:* Check the log file below for errors\."
          
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"
          
          if [ -f build_log.txt ]; then
            curl -F "chat_id=$CHAT_ID" -F document=@"build_log.txt" \
                 -F caption="рџ“„ *Logs for Build ID: $RUN_ID*" \
                 -F "parse_mode=MarkdownV2" \
                 "https://api.telegram.org/bot$TOKEN/sendDocument"
          fi