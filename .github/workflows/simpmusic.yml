name: SimpMusic Android Pro Builder
on:
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PROJECT_NAME: "SimpMusic"
      GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"
    
    steps:
      - name: 🚀 Start & Notify Telegram
        run: |
          START_TIME=$(date +%s)
          RUN_ID="${{ github.run_id }}"
          MSG="📦 *Project:* \`$PROJECT_NAME\`%0A🆔 *Build ID:* \`$RUN_ID\`%0A🚀 *Status:* \[░░░░░░░░░░░░░░░░░░░░\] 0%25%0A⚙️ *Stage:* Setup Check\.\.\."
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID&text=$MSG&parse_mode=MarkdownV2")
          echo "MSG_ID=$(echo $RESPONSE | jq -r '.result.message_id')" >> $GITHUB_ENV
          echo "START_TIME=$START_TIME" >> $GITHUB_ENV
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          repository: 'maxrave-dev/SimpMusic'
          ref: 'main'
          submodules: 'recursive'

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: 🏗️ Build Android APK
        run: |
          MSG="📦 *Project:* \`$PROJECT_NAME\`%0A🆔 *Build ID:* \`$RUN_ID\`%0A📊 *Status:* \[▓▓▓▓▓▓▓▓▓▓░░░░░░░░░░\] 50%25%0A⚙️ *Stage:* Investigation Mode\.\.\."
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"

          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "org.gradle.configuration-cache=false" >> gradle.properties
          
          chmod +x gradlew
          # We use '|| true' to ensure the script doesn't stop immediately on error
          # This allows us to capture the log and file list
          ./gradlew :composeApp:assembleDebug --stacktrace > build_log.txt 2>&1 || touch BUILD_FAILED
          
          # List all files to see where the APK went
          find . -name "*.apk" > file_list.txt

      - name: 🔐 Process Artifact & MD5
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "debug" | head -n 1)
          if [ ! -z "$APK_PATH" ]; then
            cp "$APK_PATH" SimpMusic_Build_${{ env.RUN_ID }}.apk
            md5sum SimpMusic_Build_${{ env.RUN_ID }}.apk | awk '{ print $1 }' > md5.txt
            echo "APK_EXISTS=true" >> $GITHUB_ENV
          fi

      - name: ✅ Success & Delivery
        if: env.APK_EXISTS == 'true'
        run: |
          END_TIME=$(date +%s)
          DURATION=$(( (END_TIME - START_TIME) / 60 ))
          MD5_SUM=$(cat md5.txt)
          MSG="📦 *Project:* \`$PROJECT_NAME\`%0A🆔 *Build ID:* \`$RUN_ID\`%0A✅ *Android Build Finished\!*%0A⏱️ *Time:* \`${DURATION}m\`%0A📊 *Status:* \[▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓\] 100%25"
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"
          
          curl -F "chat_id=$CHAT_ID" -F document=@"SimpMusic_Build_${{ env.RUN_ID }}.apk" \
               -F caption="📱 *SimpMusic Android APK*%0A🆔 *Build:* \`$RUN_ID\`%0A🔑 *MD5:* \`$MD5_SUM\`" \
               -F "parse_mode=MarkdownV2" \
               "https://api.telegram.org/bot$TOKEN/sendDocument"

      - name: ❌ Failure / Final Log Delivery
        if: always()
        run: |
          # If the APK wasn't found, notify failure
          if [ "$APK_EXISTS" != "true" ]; then
            MSG="📦 *Project:* \`$PROJECT_NAME\`%0A🆔 *Build ID:* \`$RUN_ID\`%0A🚨 *Build FAILED\!*%0A❌ *Logs sent below\.*"
            curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
              -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"
          fi
          
          # Always send logs and file list so we can see what's happening
          [ -f build_log.txt ] && curl -F "chat_id=$CHAT_ID" -F document=@"build_log.txt" -F caption="📄 Log $RUN_ID" "https://api.telegram.org/bot$TOKEN/sendDocument"
          [ -f file_list.txt ] && curl -F "chat_id=$CHAT_ID" -F document=@"file_list.txt" -F caption="📂 File List $RUN_ID" "https://api.telegram.org/bot$TOKEN/sendDocument"