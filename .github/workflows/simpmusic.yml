name: SimpMusic Android Pro Builder
on:
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PROJECT_NAME: "SimpMusic"
      GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"
    
    steps:
      - name: рҹҡҖ Start & Notify Telegram
        run: |
          START_TIME=$(date +%s)
          RUN_ID="${{ github.run_id }}"
          MSG="рҹ“Ұ *Project:* \`$PROJECT_NAME\`%0AрҹҶ” *Build ID:* \`$RUN_ID\`%0AрҹҡҖ *Status:* \[в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘\] 0%25%0AвҡҷпёҸ *Stage:* Setup Check\.\.\."
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID&text=$MSG&parse_mode=MarkdownV2")
          echo "MSG_ID=$(echo $RESPONSE | jq -r '.result.message_id')" >> $GITHUB_ENV
          echo "START_TIME=$START_TIME" >> $GITHUB_ENV
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: рҹ“Ҙ Checkout Code
        uses: actions/checkout@v4
        with:
          repository: 'maxrave-dev/SimpMusic'
          ref: 'main'
          submodules: 'recursive'

      - name: вҳ• Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: рҹҸ—пёҸ Build Android APK
        run: |
          MSG="рҹ“Ұ *Project:* \`$PROJECT_NAME\`%0AрҹҶ” *Build ID:* \`$RUN_ID\`%0Aрҹ“Ҡ *Status:* \[в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘\] 50%25%0AвҡҷпёҸ *Stage:* Force Compiling Debug APK\.\.\."
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"

          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          # debug build is less strict than release
          chmod +x gradlew
          ./gradlew clean :composeApp:assembleDebug --stacktrace > build_log.txt 2>&1

      - name: рҹ”җ Process Artifact & MD5
        if: success()
        run: |
          # Debug APKs are usually in the 'debug' folder
          APK_PATH=$(find composeApp/build/outputs/apk/debug -name "*.apk" | head -n 1)
          cp "$APK_PATH" SimpMusic_Debug_${{ env.RUN_ID }}.apk
          MD5_SUM=$(md5sum SimpMusic_Debug_${{ env.RUN_ID }}.apk | awk '{ print $1 }')
          echo "MD5_SUM=$MD5_SUM" >> $GITHUB_ENV

      - name: вң… Success & Delivery
        if: success()
        run: |
          END_TIME=$(date +%s)
          DURATION=$(( (END_TIME - START_TIME) / 60 ))
          MSG="рҹ“Ұ *Project:* \`$PROJECT_NAME\`%0AрҹҶ” *Build ID:* \`$RUN_ID\`%0Aвң… *Android Build Finished\!*%0AвҸұпёҸ *Time:* \`${DURATION}m\`%0Aрҹ“Ҡ *Status:* \[в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“\] 100%25"
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"
          
          curl -F "chat_id=$CHAT_ID" -F document=@"SimpMusic_Debug_${{ env.RUN_ID }}.apk" \
               -F caption="рҹ“ұ *SimpMusic Android APK (Debug)*%0AрҹҶ” *Build:* \`$RUN_ID\`%0Aрҹ”‘ *MD5:* \`$MD5_SUM\`" \
               -F "parse_mode=MarkdownV2" \
               "https://api.telegram.org/bot$TOKEN/sendDocument"

      - name: вқҢ Failure & Log Delivery
        if: failure()
        run: |
          MSG="рҹ“Ұ *Project:* \`$PROJECT_NAME\`%0AрҹҶ” *Build ID:* \`$RUN_ID\`%0AрҹҡЁ *Android Build FAILED\!*%0AвқҢ *Full Log Attached Below\.*"
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"
          
          if [ -f build_log.txt ]; then
            curl -F "chat_id=$CHAT_ID" -F document=@"build_log.txt" \
                 -F caption="рҹ“„ *Final Debug Log: $RUN_ID*" \
                 -F "parse_mode=MarkdownV2" \
                 "https://api.telegram.org/bot$TOKEN/sendDocument"
          fi