name: SimpMusic Ultra Pro Builder
on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build_arch:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PROJECT_NAME: "SimpMusic"
    
    steps:
      - name: рџљЂ Start & Notify Telegram
        id: init_step
        run: |
          START_TIME=$(date +%s)
          USER="${{ github.actor }}"
          RUN_ID="${{ github.run_id }}"
          
          # Construct the initial message
          MSG="рџ“¦ *Project:* \`$PROJECT_NAME\`%0AрџљЂ *Build Triggered* (branch: \`main\`)%0Aв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ%0Aрџ‘¤ *User:* \`$USER\`%0Aрџ†” *Build ID:* \`$RUN_ID\`%0Aрџ“Љ *Status:* \[в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘\] 0%25%0Aвљ™пёЏ *Stage:* Preparing Arch Container\.\.\."
          
          # Send message and capture response
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID&text=$MSG&parse_mode=MarkdownV2")
          
          # Extract clean Message ID (no quotes) using jq -r
          MSG_ID=$(echo $RESPONSE | jq -r '.result.message_id')
          
          # Validate MSG_ID before proceeding
          if [ "$MSG_ID" == "null" ] || [ -z "$MSG_ID" ]; then
            echo "Error: Failed to get Telegram Message ID"
            exit 1
          fi

          # Save variables to Environment for next steps
          echo "START_TIME=$START_TIME" >> $GITHUB_ENV
          echo "MSG_ID=$MSG_ID" >> $GITHUB_ENV

      - name: рџЏ—пёЏ Arch Linux Build
        run: |
          # Update Progress to 50%
          MSG="рџ“¦ *Project:* \`$PROJECT_NAME\`%0AрџљЂ *Build Running*%0Aв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ%0Aрџ“Љ *Status:* \[в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘\] 50%25%0Aвљ™пёЏ *Stage:* Compiling from Main Branch\.\.\."
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"

          # Use official Arch Linux Docker container
          # We map the current workspace to /workspace inside the container
          docker run --rm -v $PWD:/workspace -w /workspace archlinux:latest /bin/bash -c "
            pacman -Syu --noconfirm base-devel git jdk17-openjdk gstreamer glu hicolor-icon-theme
            useradd -m builder && chown -R builder /workspace
            
            cat <<EOF > PKGBUILD
            pkgname=simpmusic-git
            pkgver=\$(date +%Y%m%d)
            pkgrel=1
            arch=('x86_64')
            depends=('java-runtime>=17' 'gstreamer' 'glu' 'hicolor-icon-theme')
            # Fetching specifically from the main branch
            source=('SimpMusic::git+https://github.com/maxrave-dev/SimpMusic.git#branch=main')
            md5sums=('SKIP')

            build() {
              # FIXED: No leading slash before srcdir
              cd \"\$srcdir/SimpMusic\"
              chmod +x gradlew
              ./gradlew :composeApp:packageReleaseDistributionForCurrentOS
            }

            package() {
              cd \"\$srcdir/SimpMusic\"
              # Search for the executable binary in the build binaries output
              BINARY_PATH=\$(find . -type f -executable -name \"SimpMusic\" | grep \"binaries\" | head -n 1)
              if [ -z \"\$BINARY_PATH\" ]; then
                echo \"ERROR: Could not find SimpMusic binary\!\"
                exit 1
              fi
              install -Dm755 \"\$BINARY_PATH\" \"\$pkgdir/usr/bin/simpmusic\"
            }
          EOF
            
            # Run build as the non-root 'builder' user
            su builder -c 'makepkg -fc --noconfirm'
          " 2>&1 | tee build_log.txt

      - name: вњ… Success & Artifact Delivery
        if: success()
        run: |
          END_TIME=$(date +%s)
          DURATION=$(( (END_TIME - START_TIME) / 60 ))
          SEC_REM=$(( (END_TIME - START_TIME) % 60 ))
          
          MSG="рџ“¦ *Project:* \`$PROJECT_NAME\`%0Aвњ… *Build Finished\!*%0Aв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ%0AвЏ±пёЏ *Time:* \`${DURATION}m ${SEC_REM}s\`%0Aрџ“Љ *Status:* \[в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“\] 100%25%0AрџЋЃ *Artifact:* Sending .zst file now\.\.\."
          
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"
          
          # Find and send the .zst package
          ZST_FILE=$(ls *.pkg.tar.zst | head -n 1)
          curl -F "chat_id=$CHAT_ID" -F document=@"$ZST_FILE" \
               -F caption="рџ“¦ *Artifact: $PROJECT_NAME (Arch Linux)*%0ADuration: \`${DURATION}m ${SEC_REM}s\`%0AInstall: \`sudo pacman -U $ZST_FILE\`" \
               -F "parse_mode=MarkdownV2" \
               "https://api.telegram.org/bot$TOKEN/sendDocument"

      - name: вќЊ Failure Handling
        if: failure()
        run: |
          MSG="рџ“¦ *Project:* \`$PROJECT_NAME\`%0AрџљЁ *Build FAILED*%0Aв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ%0AвќЊ *Result:* Compilation error occurred\. Logs attached below\."
          
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"
          
          # Send the log file if it exists
          if [ -f build_log.txt ]; then
            curl -F "chat_id=$CHAT_ID" -F document=@"build_log.txt" \
                 -F caption="рџ“„ *Error Log: $PROJECT_NAME*" \
                 -F "parse_mode=MarkdownV2" \
                 "https://api.telegram.org/bot$TOKEN/sendDocument"
          fi

      - name: вЏ№пёЏ Cancelled Handling
        if: cancelled()
        run: |
          MSG="рџ“¦ *Project:* \`$PROJECT_NAME\`%0AвЏ№пёЏ *Build Cancelled*%0Aв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ%0Aвљ пёЏ *Result:* Build was stopped by user \`${{ github.actor }}\`\."
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"