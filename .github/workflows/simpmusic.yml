name: SimpMusic Ultra Pro Builder
on:
  workflow_dispatch: # Manual Trigger

jobs:
  build_arch:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TARGET_URL: "https://github.com/maxrave-dev/SimpMusic.git"
    
    steps:
      - name: 🚀 Start & Notify Telegram
        id: init
        run: |
          # Capture start time and metadata
          START_TIME=$(date +%s)
          echo "START_TIME=$START_TIME" >> $GITHUB_ENV
          
          # Metadata for message
          USER="${{ github.actor }}"
          RUN_ID="${{ github.run_id }}"
          
          MSG="🚀 *SimpMusic Build Triggered*%0A──────────────────%0A👤 *User:* \`$USER\`%0A🆔 *Build ID:* \`$RUN_ID\`%0A📊 *Status:* \[░░░░░░░░░░░░░░░░░░░░\] 0%25%0A⚙️ *Stage:* Initializing Container\.\.\."
          
          RES=$(curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID&text=$MSG&parse_mode=MarkdownV2")
          echo "MSG_ID=$(echo $RES | jq '.result.message_id')" >> $GITHUB_ENV

      - name: 📥 Stealth Clone
        run: |
          MSG="🚀 *SimpMusic Build Running*%0A──────────────────%0A👤 *User:* \`${{ github.actor }}\`%0A🆔 *Build ID:* \`${{ github.run_id }}\`%0A📊 *Status:* \[▓▓▓░░░░░░░░░░░░░░░░░\] 15%25%0A⚙️ *Stage:* Cloning Source\.\.\."
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"
          git clone --depth 1 $TARGET_URL src

      - name: 🏗️ Arch Linux Build
        run: |
          MSG="🚀 *SimpMusic Build Running*%0A──────────────────%0A👤 *User:* \`${{ github.actor }}\`%0A🆔 *Build ID:* \`${{ github.run_id }}\`%0A📊 *Status:* \[▓▓▓▓▓▓▓▓▓▓░░░░░░░░░░\] 50%25%0A⚙️ *Stage:* Compiling with Makepkg\.\.\."
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"

          docker run --rm -v $PWD:/workspace -w /workspace archlinux:latest /bin/bash -c "
            pacman -Syu --noconfirm base-devel git jdk17-openjdk gstreamer glu hicolor-icon-theme
            useradd -m builder && chown -R builder /workspace
            cat <<EOF > PKGBUILD
            pkgname=simpmusic-git
            pkgver=$(date +%Y%m%d)
            pkgrel=1
            arch=('x86_64')
            depends=('java-runtime>=17' 'gstreamer' 'glu') 
            build() {
              cd src
              ./gradlew :desktop:packageReleaseDistributionForCurrentOS
            }
            package() {
              cd src
              install -Dm755 build/compose/binaries/main/app/SimpMusic \"\$pkgdir/usr/bin/simpmusic\"
            }
          EOF
            su builder -c 'makepkg -f --noconfirm'
          "

      - name: ✅ Success & Delivery
        if: success()
        run: |
          # Calculate duration
          END_TIME=$(date +%s)
          DURATION=$(( (END_TIME - START_TIME) / 60 ))
          SEC_REM=$(( (END_TIME - START_TIME) % 60 ))
          
          MSG="✅ *SimpMusic Build Finished\!*%0A──────────────────%0A👤 *User:* \`${{ github.actor }}\`%0A🆔 *Build ID:* \`${{ github.run_id }}\`%0A⏱️ *Time:* \`${DURATION}m ${SEC_REM}s\`%0A📊 *Status:* \[▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓\] 100%25%0A🎁 *Artifact:* Sent below\."
          
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"
          
          ZST_FILE=$(ls *.pkg.tar.zst)
          curl -F "chat_id=$CHAT_ID" -F document=@"$ZST_FILE" \
               -F caption="📦 *SimpMusic Arch Linux Build*%0ADuration: \`${DURATION}m ${SEC_REM}s\`" \
               -F "parse_mode=MarkdownV2" \
               "https://api.telegram.org/bot$TOKEN/sendDocument"

      - name: ❌ Failure/Cancel Alert
        if: failure() || cancelled()
        run: |
          STATUS="${{ job.status }}"
          MSG="🚨 *Build ${STATUS^^}*%0A──────────────────%0A👤 *User:* \`${{ github.actor }}\`%0A🆔 *Build ID:* \`${{ github.run_id }}\`%0A❌ *Result:* Something went wrong\. Check logs\."
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"