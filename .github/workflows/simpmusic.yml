name: SimpMusic Ultra Pro Builder
on:
  workflow_dispatch:

jobs:
  build_arch:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PROJECT_NAME: "SimpMusic"
    
    steps:
      - name: рҹҡҖ Start & Notify Telegram
        run: |
          START_TIME=$(date +%s)
          echo "START_TIME=$START_TIME" >> $GITHUB_ENV
          USER="${{ github.actor }}"
          RUN_ID="${{ github.run_id }}"
          
          MSG="рҹ“Ұ *Project:* \`$PROJECT_NAME\`%0AрҹҡҖ *Build Triggered* (branch: \`main\`)%0Aв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ%0Aрҹ‘Ө *User:* \`$USER\`%0AрҹҶ” *Build ID:* \`$RUN_ID\`%0Aрҹ“Ҡ *Status:* \[в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘\] 0%25%0AвҡҷпёҸ *Stage:* Preparing Arch Container\.\.\."
          
          RES=$(curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID&text=$MSG&parse_mode=MarkdownV2")
          echo "MSG_ID=$(echo $RES | jq '.result.message_id')" >> $GITHUB_ENV

      - name: рҹҸ—пёҸ Arch Linux Build
        run: |
          MSG="рҹ“Ұ *Project:* \`$PROJECT_NAME\`%0AрҹҡҖ *Build Running*%0Aв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ%0Aрҹ‘Ө *User:* \`${{ github.actor }}\`%0AрҹҶ” *Build ID:* \`${{ github.run_id }}\`%0Aрҹ“Ҡ *Status:* \[в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘в–‘\] 50%25%0AвҡҷпёҸ *Stage:* Compiling Main Branch\.\.\."
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"

          docker run --rm -v $PWD:/workspace -w /workspace archlinux:latest /bin/bash -c "
            pacman -Syu --noconfirm base-devel git jdk17-openjdk gstreamer glu hicolor-icon-theme
            useradd -m builder && chown -R builder /workspace
            
            cat <<EOF > PKGBUILD
            pkgname=simpmusic-git
            pkgver=\$(date +%Y%m%d)
            pkgrel=1
            arch=('x86_64')
            depends=('java-runtime>=17' 'gstreamer' 'glu')
            # FORCED BRANCH: main
            source=('SimpMusic::git+https://github.com/maxrave-dev/SimpMusic.git#branch=main')
            md5sums=('SKIP')

            build() {
              cd \"\$srcdir/SimpMusic\"
              chmod +x gradlew
              ./gradlew :composeApp:packageReleaseDistributionForCurrentOS
            }

            package() {
              cd \"\$srcdir/SimpMusic\"
              BINARY_PATH=\$(find . -type f -executable -name \"SimpMusic\" | grep \"binaries\" | head -n 1)
              if [ -z \"\$BINARY_PATH\" ]; then
                echo \"ERROR: Could not find binary\!\"
                exit 1
              fi
              install -Dm755 \"\$BINARY_PATH\" \"\$pkgdir/usr/bin/simpmusic\"
            }
          EOF
            
            su builder -c 'makepkg -fc --noconfirm'
          " 2>&1 | tee build_log.txt

      - name: вң… Success & Delivery
        if: success()
        run: |
          END_TIME=$(date +%s)
          DURATION=$(( (END_TIME - START_TIME) / 60 ))
          SEC_REM=$(( (END_TIME - START_TIME) % 60 ))
          
          MSG="рҹ“Ұ *Project:* \`$PROJECT_NAME\`%0Aвң… *Build Finished\!*%0Aв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ%0Aрҹ‘Ө *User:* \`${{ github.actor }}\`%0AрҹҶ” *Build ID:* \`${{ github.run_id }}\`%0AвҸұпёҸ *Time:* \`${DURATION}m ${SEC_REM}s\`%0Aрҹ“Ҡ *Status:* \[в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“в–“\] 100%25"
          
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"
          
          ZST_FILE=$(ls *.pkg.tar.zst)
          curl -F "chat_id=$CHAT_ID" -F document=@"$ZST_FILE" \
               -F caption="рҹ“Ұ *Artifact: $PROJECT_NAME (Arch Linux)*%0AInstall: \`sudo pacman -U $ZST_FILE\`" \
               -F "parse_mode=MarkdownV2" \
               "https://api.telegram.org/bot$TOKEN/sendDocument"

      - name: вқҢ Failure Handling
        if: failure()
        run: |
          MSG="рҹ“Ұ *Project:* \`$PROJECT_NAME\`%0AрҹҡЁ *Build FAILED*%0Aв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ%0Aрҹ‘Ө *User:* \`${{ github.actor }}\`%0AрҹҶ” *Build ID:* \`${{ github.run_id }}\`%0AвқҢ *Result:* Compilation error\. Logs attached below\."
          
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/editMessageText" \
            -d "chat_id=$CHAT_ID&message_id=$MSG_ID&text=$MSG&parse_mode=MarkdownV2"
          
          if [ -f build_log.txt ]; then
            curl -F "chat_id=$CHAT_ID" -F document=@"build_log.txt" \
                 -F caption="рҹ“„ *Error Log: $PROJECT_NAME*" \
                 -F "parse_mode=MarkdownV2" \
                 "https://api.telegram.org/bot$TOKEN/sendDocument"
          fi